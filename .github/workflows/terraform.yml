name: Terraform

# Static validation only: no AWS credentials are configured, so no plan runs
# against a real account and the workflow is safe to run on fork pull requests.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Format, validate and scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Check formatting
        run: terraform fmt -check -recursive -diff

      - name: Initialise without a backend
        run: terraform init -backend=false -input=false

      - name: Validate configuration
        run: terraform validate

      - name: Lint the bootstrap script
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          # The bootstrap script is a Terraform template, so `${...}` placeholders
          # are not shell syntax: SC1083 and SC2154 are expected there and are
          # excluded rather than the whole file being waved through.
          shellcheck --severity=warning deploy.command cleanup-vault.command
          shellcheck --severity=error --exclude=SC1083,SC2154 scripts/user_data.sh

      - name: Scan for misconfiguration
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          # .terraform/ holds downloaded provider schemas, not our code.
          skip-dirs: .terraform
          # Accepted findings are documented with their reasoning in this file.
          trivyignores: .trivyignore
