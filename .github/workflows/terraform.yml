name: Terraform

# Static validation only: no AWS credentials are configured, so no plan runs
# against a real account and the workflow is safe to run on fork pull requests.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Format, validate and scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Check formatting
        run: terraform fmt -check -recursive -diff

      - name: Initialise without a backend
        run: terraform init -backend=false -input=false

      - name: Validate configuration
        run: terraform validate

      - name: Lint the bootstrap script
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          # The bootstrap script is a Terraform template, so `${...}` placeholders
          # are not shell syntax: SC1083 and SC2154 are expected there and are
          # excluded rather than the whole file being waved through.
          shellcheck --severity=warning deploy.command cleanup-vault.command
          shellcheck --severity=error --exclude=SC1083,SC2154 scripts/user_data.sh

      # Installed directly rather than through trivy-action: that action clones
      # the Trivy repository and runs its installer, which failed on the runner
      # while downloading the release archive. A pinned download with a checksum
      # check has fewer moving parts and verifies what it executes.
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.72.0"
        run: |
          base="https://github.com/aquasecurity/trivy/releases/download/v$TRIVY_VERSION"
          archive="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          curl -sSfL -o "$archive" "$base/$archive"
          curl -sSfL -o checksums.txt "$base/trivy_${TRIVY_VERSION}_checksums.txt"
          grep " $archive\$" checksums.txt | sha256sum -c -
          tar -xzf "$archive" trivy
          sudo install -m 755 trivy /usr/local/bin/trivy
          rm -f trivy "$archive" checksums.txt
          trivy --version

      - name: Scan for misconfiguration
        run: |
          # .terraform/ holds provider schemas downloaded by the init step above,
          # not our code. Accepted findings are documented in .trivyignore.
          trivy config . \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --skip-dirs .terraform \
            --ignorefile .trivyignore
